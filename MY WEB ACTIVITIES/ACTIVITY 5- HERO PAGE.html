<!DOCTYPE html>
<html>
<head>
    <title>ACT 5 Hero Page</title>
    <link rel="icon" href="sharky.png" type="image/png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Times New Roman', Times, serif;
            background-image: url("lonesurf.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            color: white;
            overflow: hidden;
            position: relative;
        }

        .Conquer-left {
            position: absolute;
            top: 40%;
            left: 7%;
            transform: translateY(-50%);
            max-width: 420px;
        }

        .conquer-title {
            font-family: Georgia, "Times New Roman", serif;
            font-style: italic;
            line-height: 1.1;
            margin-bottom: 10px;
        }

        .conquer-title span {
            display: block;
            font-size: 95px;
        }

        .conquer-title small {
            display: block;
            font-size: 73px;
        }

        .tides-sub {
            font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 24px;
            margin-top: 15px;
        }

        .wave button {
            padding: 14px 34px;
            font-size: 15px;
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-style: italic;
            font-weight:lighter;
            border: 2px solid transparent;
            margin-top: 20px;
            border-radius: 6px;
            background: #00e5ff;
            color: #00053f;
            cursor: pointer;
            transition: 0.28s ease;
        }

        .wave button:hover {
            background: #ffffff;
            color: #00b8cc;
            transform: translateY(-6px);
            box-shadow: 0 10px 25px #ffffff8c;
            
        }

        .wave button:active {
            border: 2px solid #000;
            transform: scale(0.96);
            box-shadow: 0 0 15px #ffffff;
        }

        .motivation {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 320px;
            text-align: right;
        }

        .quote {
            margin-bottom: 18px;
            font-size: 15px;
            line-height: 1.5;
            opacity: 0.9;
            font-style: italic;
            border-right: 3px solid #00e5ff;
            padding-right: 14px;
            transition: 0.3s ease;
        }

        .quote:hover {
            transform: translateX(-10px);
            color: #86e7ff;
            text-shadow: 0 0 10px #56eeff, 0 0 20px #032481;
            opacity: 1;
        }
    </style>
</head>

<body>

    <div class="Conquer-left">

        <h1 class="conquer-title">
            <span>Conquer</span>
            <small>the Waves</small>
        </h1>

        <p class="tides-sub">
            For those who live between tides and time,
             where the ocean becomes a rhythm and every wave carries a sense of freedom.
        </p>

        <div class="wave">
            <button>ride the wave</button>
        </div>

    </div>


    <div class="motivation">

        <div class="quote">
            “The ocean answers what the heart carries”
        </div>

        <div class="quote">
            “Life is greater than waves. Conquer it!”
        </div>

        <div class="quote">
            “Ride the wave, trust the tide.”
        </div>

    </div>

</body>
</html>
