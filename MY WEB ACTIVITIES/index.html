<!DOCTYPE html>
<html>
<head>
    <title>ACT 6 Login Page</title>
    <link rel="icon" href="sharky.png" type="image/png">

    <style>
        *{
            box-sizing:border-box;
        }

        body{
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url("surfing.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:flex-start;
            padding-left: 70px;
        }

        .surfbox{
           background: rgba(4, 24, 46, 0.23);
            border:1px solid #a0f5ff;
            border-radius:20px;
            padding:33px;
            width:280px;
            text-align:center;
            box-shadow:0 0 30px #69fff022;
            backdrop-filter: blur(15px);
            transition:  0.3s ease, 0.5s ease;
        }

        .surfbox:hover{
            transform: translateY(-12px);
            box-shadow: 0 20px 50px rgba(152, 245, 255, 0.553);
        }

        .surfbox h1{
           font-size:26px;
            margin-top: 0;
            margin-bottom:0px;
            color:white;
            text-shadow:0 0 10px #74b5ff;
        }

        .surfbox p{
            color:#e0faff;
            font-size:15px;
            margin-top: 8px;
            margin-bottom:20px;
        }

        .surfbox input{
            width:100%;
            padding:12px 16px;
            margin-bottom:19px; 
            border-radius:8px;
           border:1px solid #00e5ff44;
            background:rgb(211, 254, 255);
            color:rgb(0, 39, 81);
            font-size:11px;
        }

        .surfbox input:last-child{
            margin-bottom:23px;
        }

        .surfbox input::placeholder{
            color: rgba(61, 61, 66, 0.736);
        }

        .surfbox button{
            width:100%;
            padding:12px;
            margin-top:10px; 
            background:#00e5ff;
            color:#081c65;
            font-weight:bold;
            font-size:12px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            transition:0.3s;
        }

        .surfbox button:hover{
            background:#ffffff;
            box-shadow:0 0 16px #5bd1ffe0;
        }

        .surfbox .link{
           margin-top:8px;
            font-size:10px;
            color:#ffffff;
        }

        .surfbox .link a{
            color:#8df4ff;
            text-decoration:none;
        }
    </style>
</head>

<body>

    <div class="surfbox">
        <h1>AHOY! SURFER</h1>
        <p>Sign in to your account</p>

        <div class="inputs">
            <input type="text" placeholder="Username or Email">
            <input type="password" placeholder="Password">
        </div>

        <button>Surf In</button>

        <div class="link">
            Don't have an account?
            <a href="#">Sign up</a>
        </div>
    </div>

</body>
</html>
